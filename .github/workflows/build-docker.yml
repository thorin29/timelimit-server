name: Build and Push Docker Image

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/timelimit-server:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/timelimit-server:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/timelimit-server:${{ github.run_number }}
          build-args: |
            NODE_VERSION=20   # This overrides the FROM in Dockerfile if it supports ARG
          platforms: linux/amd64
